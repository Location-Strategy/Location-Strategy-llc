<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Location Strategy LLC | Real Estate Market Studies</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sage: #8aaa3a;
      --navy: #1a242f; 
      --cream: #f9f9f4;
      --white: #ffffff;
      --text-main: #3a3a2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; color: var(--text-main); background: var(--white); line-height: 1.6; }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: var(--white); padding: 1.5rem 4rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #f0f0f0;
    }
    .logo-img { height: 50px; width: auto; }
    nav ul { display: flex; list-style: none; gap: 2.5rem; align-items: center; }
    nav a { color: var(--navy); text-decoration: none; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; transition: 0.3s; }
    nav a:hover { color: var(--sage); }

    section { padding: 8rem 4rem; }
    .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--sage); letter-spacing: 0.2em; display: block; margin-bottom: 1.5rem; }

    /* HERO */
    #hero { 
      min-height: 85vh; background: #1e262f; display: grid; grid-template-columns: 1.2fr 1fr; 
      align-items: center; padding: 6rem; color: var(--white); margin-top: 80px; 
    }
    .hero-content h1 { font-family: 'Cormorant Garamond', serif; font-size: 5.5rem; font-weight: 300; line-height: 1.1; margin-bottom: 2rem; }
    .hero-content h1 em { color: var(--sage); font-style: italic; }
    .hero-content p { font-size: 1.25rem; max-width: 500px; opacity: 0.9; font-weight: 300; }

    .stats-box { 
      border: 1px solid rgba(255,255,255,0.1); padding: 4rem; display: grid; 
      grid-template-columns: 1fr 1fr; gap: 3rem; background: rgba(255,255,255,0.02);
    }
    .stat-item h4 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; color: var(--sage); font-weight: 400; line-height: 1; }
    .stat-item p { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: #ccc; }

    /* ABOUT SECTION */
    #about { max-width: 1250px; margin: 0 auto; }
    .about-header { margin-bottom: 4rem; }
    .about-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 4rem; color: var(--navy); margin-bottom: 1rem; }
    .about-header h3 { font-size: 1.5rem; font-weight: 400; color: var(--text-main); margin-bottom: 2rem; }
    
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; }
    .principal-card { background: var(--cream); padding: 0; display: flex; flex-direction: column; }
    .principal-image { width: 100%; height: auto; display: block; }
    .principal-text { padding: 2.5rem; }
    
    .highlight-box { 
        background: var(--cream); padding: 2.5rem; border-left: 4px solid var(--sage); margin: 2rem 0; 
    }

    /* SERVICES */
    #services { background: var(--white); border-top: 1px solid #eee; }
    .services-intro { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem; margin-bottom: 6rem; }
    .intro-item h3 { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--navy); margin-bottom: 1.5rem; border-bottom: 2px solid var(--sage); padding-bottom: 0.5rem; display: inline-block; }
    
    .services-main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2.5rem; }
    .service-detailed-card { background: var(--cream); padding: 2.5rem; border: 1px solid #e0e0e0; }
    .service-detailed-card h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--sage); margin-bottom: 1.5rem; }
    .service-detailed-card ul { list-style: none; }
    .service-detailed-card ul li { font-size: 0.9rem; margin-bottom: 0.8rem; padding-left: 1.5rem; position: relative; }
    .service-detailed-card ul li::before { content: "•"; position: absolute; left: 0; color: var(--sage); font-weight: bold; }

    /* FAQS */
    #faqs { max-width: 1000px; margin: 0 auto; background: var(--white); }
    .faq-title { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; color: var(--sage); margin-bottom: 0.5rem; }
    .faq-header-info { margin-bottom: 3rem; font-size: 1rem; color: var(--text-main); }
    .faq-header-info a { color: var(--sage); text-decoration: none; border-bottom: 1px solid var(--sage); }

    .faq-item { border-bottom: 1px solid #eee; padding: 1rem 0; }
    .faq-question { 
      font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; color: var(--navy); 
      cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; 
    }
    .faq-toggle-icon { font-size: 0.8rem; color: var(--sage); transition: transform 0.4s ease; }
    .faq-answer { max-height: 0; overflow: hidden; transition: all 0.4s ease-in-out; font-size: 1.1rem; color: var(--text-main); opacity: 0; }

    .faq-item.active .faq-answer { max-height: 500px; padding-bottom: 2rem; opacity: 1; }
    .faq-item.active .faq-toggle-icon { transform: rotate(180deg); }
